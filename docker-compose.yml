services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plannit}
      POSTGRES_USER: ${POSTGRES_USER:-plannit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plannit}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plannit} -d ${POSTGRES_DB:-plannit}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      target: development
    restart: unless-stopped
    env_file:
      - ./.env
      - ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.development}
      DJANGO_COLLECTSTATIC: "0"
      DJANGO_SEED_DEMO_DATA: "1"
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql://${POSTGRES_USER:-plannit}:${POSTGRES_PASSWORD:-plannit}@db:5432/${POSTGRES_DB:-plannit}
    command: ["/app/scripts/start-dev.sh"]
    volumes:
      - ./backend:/app
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/')\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      target: development
    restart: unless-stopped
    env_file:
      - ./.env
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      NODE_ENV: development
    command: ["/app/scripts/start-dev.sh"]
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  backend_static:
  backend_media:
  frontend_node_modules:

